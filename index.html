<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morse Code Input Tester</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; background-color: #222; color: white;}
        #telegraph-btn { padding: 40px 80px; font-size: 24px; cursor: pointer; background: #555; color: white; border: none; border-radius: 8px; user-select: none;}
        #telegraph-btn:active { background: #777; transform: scale(0.98); }
        #debug-output { margin-top: 20px; font-family: monospace; font-size: 18px; white-space: pre-line; text-align: center;}
    </style>
</head>
<body>

    <h2>Hold for Dash (-), Tap for Dot (.)</h2>
    <button id="telegraph-btn">TAP ME</button>
    <div id="debug-output">Awaiting input...</div>

<script>
class MorsePlayer {
    constructor() {
        // --- Timing Thresholds (in milliseconds) ---
        this.DASH_THRESHOLD = 200;       // Hold longer than this for a dash
        this.LETTER_GAP_THRESHOLD = 600; // Silence longer than this completes the letter

        // --- State Variables ---
        this.pressStartTime = 0;
        this.currentSequence = "";
        this.letterTimer = null;
        this.isHolding = false;
        
        this.debugElement = document.getElementById('debug-output');
    }

    onPointerDown() {
        this.isHolding = true;
        this.pressStartTime = Date.now();

        // The player is typing again, so cancel the "letter completion" countdown
        if (this.letterTimer) {
            clearTimeout(this.letterTimer);
            this.letterTimer = null;
        }
        
        console.log("Press started...");
    }

    onPointerUp() {
        // Prevent weird behavior if the mouse leaves the button and comes back
        if (!this.isHolding) return; 
        this.isHolding = false;

        // Calculate how long the button was held down
        const holdDuration = Date.now() - this.pressStartTime;
        
        // Determine if it was a dot or a dash
        const symbol = holdDuration >= this.DASH_THRESHOLD ? "-" : ".";
        this.currentSequence += symbol;

        const logMsg = `Registered: ${symbol} (Held for ${holdDuration}ms). Current: ${this.currentSequence}`;
        console.log(logMsg);
        this.debugElement.innerText = logMsg;

        // Start a countdown. If no new input happens before this timer runs out, 
        // we consider the letter finished.
        this.letterTimer = setTimeout(() => {
            this.completeLetter();
        }, this.LETTER_GAP_THRESHOLD);
    }

    completeLetter() {
        if (this.currentSequence.length > 0) {
            const successMsg = `\n--- Letter Sequence Completed: [ ${this.currentSequence} ] ---\n`;
            console.log(successMsg);
            this.debugElement.innerText = successMsg + "\nReady for next letter.";
            
            // In Step 2, you will pass 'this.currentSequence' to your Manager Object here!
            
            // Reset for the next letter
            this.currentSequence = ""; 
        }
    }
}

// --- Initialization ---
const player = new MorsePlayer();
const btn = document.getElementById('telegraph-btn');

// Using pointer events so it works on both mouse clicks and mobile touch screens
btn.addEventListener('pointerdown', (e) => {
    e.preventDefault(); // Stop text highlighting/scrolling
    player.onPointerDown();
});

btn.addEventListener('pointerup', (e) => {
    e.preventDefault();
    player.onPointerUp();
});

// Also trigger pointer up if the mouse leaves the button while holding
btn.addEventListener('pointerleave', (e) => {
    if(player.isHolding) player.onPointerUp();
});

</script>
</body>
</html>
